global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: urlbeo-backend
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - host.docker.internal:3000

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

