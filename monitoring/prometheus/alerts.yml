
groups:
  - name: urlbeo-alerts
    rules:
      - alert: UrlbeoBackendDown
        expr: up{job="urlbeo-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Backend indisponible
          description: Le backend Urlbeo ne répond plus sur /api/metrics.

      - alert: High5xxErrorRate
        expr: sum(rate(http_requests_total{path!="/api/metrics",status=~"5.."}[5m])) / sum(rate(http_requests_total{path!="/api/metrics"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Taux d'erreurs 5xx élevé
          description: Plus de 5% de requêtes en 5xx sur les 5 dernières minutes.

      - alert: HighP95Latency
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{path!="/api/metrics"}[5m]))) > 0.7
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Latence p95 élevée
          description: La latence p95 dépasse 700ms depuis 5 minutes.
